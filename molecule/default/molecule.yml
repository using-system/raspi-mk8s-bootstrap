---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: raspi-test
    image: debian:bookworm
    dockerfile: Dockerfile.j2
    privileged: true
    pre_build_image: false
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    host_vars:
      raspi-test:
        ansible_user: root
        molecule_test: true
  env:
    ANSIBLE_ROLES_PATH: ../../roles

verifier:
  name: ansible
